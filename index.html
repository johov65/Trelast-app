<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trelast Plukkliste</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- HTML5 QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; background: #000; }
        #reader__dashboard_section_csr button { 
            background: #2563eb !important; color: white !important; border-radius: 0.75rem !important; padding: 0.6rem 1.2rem !important;
            font-weight: 600 !important; border: none !important; margin-top: 10px !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        #reader video { border-radius: 1.5rem; object-fit: cover; }
        
        /* iPhone Notch Support */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-gray-100 sm:bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Ikoner (SVG-komponenter) ---
        const Trash2 = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const Plus = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Barcode = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"/></svg>
        );
        const Layers = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        );
        const Sparkles = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
        );
        const Copy = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        );
        const Check = ({ size = 24 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        );
        const Loader2 = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
        );

        function App() {
          const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('trelast_plukkliste') || '[]'));
          const [barcodeDb, setBarcodeDb] = useState(() => JSON.parse(localStorage.getItem('trelast_barcodes') || '{}'));
          const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('trelast_api_key') || '');
          
          const [dimension, setDimension] = useState('48x98');
          const [materialType, setMaterialType] = useState('Vanlig');
          const [length, setLength] = useState('');
          const [quantity, setQuantity] = useState('1');
          const [activeTab, setActiveTab] = useState('plukk');
          
          const [isScanning, setIsScanning] = useState(false);
          const [scanError, setScanError] = useState(null);
          const [scannedCode, setScannedCode] = useState(null);
          const [showBarcodeModal, setShowBarcodeModal] = useState(false);
          const [autoDetectedLength, setAutoDetectedLength] = useState(null);

          const [aiInput, setAiInput] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);
          const [aiMessage, setAiMessage] = useState('');
          const [aiError, setAiError] = useState('');
          const [copied, setCopied] = useState(false);

          const scannerRef = useRef(null);
          const lengthInputRef = useRef(null);

          useEffect(() => {
            localStorage.setItem('trelast_plukkliste', JSON.stringify(items));
          }, [items]);

          useEffect(() => {
            localStorage.setItem('trelast_barcodes', JSON.stringify(barcodeDb));
          }, [barcodeDb]);

          useEffect(() => {
            localStorage.setItem('trelast_api_key', customApiKey);
          }, [customApiKey]);

          const commonDimensions = [
            "11x36", "19x148", "22x148", "23x48", "30x48", "36x48", "36x73",
            "36x98", "36x148", "36x198", "48x48", "48x73", "48x98", "48x148", "48x198", "48x223", "98x98"
          ];

          const parseCodeForLength = (code) => {
            const cleanCode = code.replace(/[\(\)]/g, "");
            
            // GS1-128: Leter etter AI 311y (y = antall desimaler, ofte 2 for trelast)
            // Eksempel: 3112000420 -> 4.20m
            const gs1Match = cleanCode.match(/311([0-5])(\d{6})/);
            if (gs1Match) {
                const decimalIndicator = parseInt(gs1Match[1]);
                const rawValue = parseInt(gs1Match[2]);
                return (rawValue / Math.pow(10, decimalIndicator)).toString();
            }

            // EAN-13 (Variabel butikk-kode): Starter på 23
            if (cleanCode.length === 13 && cleanCode.startsWith("23")) {
                const val = parseInt(cleanCode.substring(7, 12));
                if (val > 0) return (val / 100).toString();
            }
            return null;
          };

          const startScanner = async () => {
            setScanError(null);
            setIsScanning(true);
            await new Promise(r => setTimeout(r, 400));
            try {
              const html5QrCode = new Html5Qrcode("reader");
              scannerRef.current = html5QrCode;
              await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 160 } },
                (decodedText) => {
                  stopScanner();
                  handleScannedCode(decodedText);
                },
                () => {}
              );
            } catch (err) {
              setScanError("Kameraet kunne ikke startes. Sjekk tillatelser.");
              setIsScanning(false);
            }
          };

          const stopScanner = async () => {
            if (scannerRef.current) {
              await scannerRef.current.stop();
              scannerRef.current = null;
            }
            setIsScanning(false);
          };

          const handleScannedCode = (code) => {
            const detectedLength = parseCodeForLength(code);
            if (detectedLength) {
                setLength(detectedLength);
                setAutoDetectedLength(detectedLength);
            }

            if (barcodeDb[code]) {
              setDimension(barcodeDb[code].dimension);
              setMaterialType(barcodeDb[code].materialType);
            } else {
              setScannedCode(code);
              setShowBarcodeModal(true);
            }
          };

          const handleAddItem = (e) => {
            if (e) e.preventDefault();
            const parsedLength = parseFloat(length.replace(',', '.'));
            const parsedQuantity = parseInt(quantity, 10);
            if (isNaN(parsedLength) || isNaN(parsedQuantity)) return;

            setItems([{
              id: Date.now().toString() + Math.random().toString(),
              dimension, materialType, length: parsedLength, quantity: parsedQuantity, subtotal: parsedLength * parsedQuantity
            }, ...items]);
            setLength('');
            setQuantity('1');
            setAutoDetectedLength(null);
            if (lengthInputRef.current) lengthInputRef.current.focus();
          };

          const handleGenerateAI = async () => {
            if (!aiInput.trim()) return;
            setIsGenerating(true);
            setAiError('');
            
            const activeKey = customApiKey.trim();
            if (!activeKey) {
                setAiError("Vennligst legg inn en Gemini API-nøkkel under 'AI'-fanen først.");
                setIsGenerating(false);
                return;
            }

            try {
              const prompt = `Brukeren planlegger følgende prosjekt: "${aiInput}". Lag en materialliste.`;
              const systemInstruction = `Du er en erfaren norsk snekker. Foreslå en materialliste basert på prosjektbeskrivelsen. 
              Bruk standard norske trelast-dimensjoner. Svar KUN med JSON-formatet: 
              { "message": "tips til prosjektet", "items": [{ "dimension": "48x98", "materialType": "Vanlig", "length": 4.8, "quantity": 10 }] }`;

              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  systemInstruction: { parts: [{ text: systemInstruction }] },
                  generationConfig: { responseMimeType: "application/json" }
                })
              });
              
              if (!response.ok) throw new Error('API Error');
              const result = await response.json();
              const parsed = JSON.parse(result.candidates[0].content.parts[0].text);
              
              setAiMessage(parsed.message);
              const newItems = parsed.items.map(i => ({
                id: Date.now().toString() + Math.random().toString(),
                dimension: i.dimension, materialType: i.materialType, length: i.length, quantity: i.quantity, subtotal: i.length * i.quantity
              }));
              setItems(prev => [...newItems, ...prev]);
              setAiInput('');
              setActiveTab('plukk');
            } catch (err) {
              setAiError("Feil ved kobling til AI. Kontroller at API-nøkkelen er gyldig.");
            }
            setIsGenerating(false);
          };

          const copySummary = () => {
            let text = "Trelast Oppsummering:\n\n";
            Object.values(groupedItems).forEach(g => {
              text += `${g.dimension} mm (${g.materialType}): ${g.totalMeters.toFixed(2)} lm\n`;
            });
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          const saveBarcodeLink = () => {
            setBarcodeDb(prev => ({ ...prev, [scannedCode]: { dimension, materialType } }));
            setShowBarcodeModal(false);
            setScannedCode(null);
          };

          const groupedItems = items.reduce((acc, item) => {
            const key = `${item.dimension}-${item.materialType}`;
            if (!acc[key]) acc[key] = { dimension: item.dimension, materialType: item.materialType, items: [], totalMeters: 0 };
            acc[key].items.push(item);
            acc[key].totalMeters += item.subtotal;
            return acc;
          }, {});

          return (
            <div className="min-h-screen flex flex-col font-sans max-w-md mx-auto bg-white shadow-2xl sm:my-8 sm:rounded-[2.5rem] overflow-hidden relative border-x border-gray-100">
              
              <header className="bg-blue-600 text-white p-4 pt-10 sm:pt-6 shadow-lg z-20">
                <div className="flex justify-between items-center mb-5 px-1">
                  <div>
                    <h1 className="text-2xl font-black tracking-tight leading-tight">Plukkliste</h1>
                    <p className="text-blue-100 text-[10px] font-black uppercase tracking-widest opacity-80">Trelast-assistent</p>
                  </div>
                  <button onClick={() => confirm('Vil du slette hele listen?') && setItems([])} className="p-3 bg-blue-500/40 hover:bg-red-500 rounded-2xl transition-all active:scale-90">
                    <Trash2 size={22}/>
                  </button>
                </div>
                
                <div className="flex bg-blue-700/50 backdrop-blur-sm rounded-2xl p-1 gap-1">
                  {['plukk', 'liste', 'ai'].map(t => (
                    <button 
                      key={t} 
                      onClick={() => setActiveTab(t)} 
                      className={`flex-1 py-2.5 text-[11px] font-black uppercase tracking-wider rounded-xl transition-all ${activeTab === t ? 'bg-white shadow-lg text-blue-600' : 'text-blue-200 hover:text-white'}`}
                    >
                      {t === 'plukk' ? 'Registrer' : t === 'liste' ? 'Liste' : 'AI'}
                    </button>
                  ))}
                </div>
              </header>

              <main className="flex-1 overflow-y-auto bg-gray-50/50 p-4 pb-24">
                {activeTab === 'plukk' && (
                  <div className="space-y-5">
                    <button 
                      onClick={isScanning ? stopScanner : startScanner} 
                      className={`w-full flex items-center justify-center p-5 rounded-[1.5rem] font-black text-white transition-all shadow-xl active:scale-[0.98] ${isScanning ? 'bg-red-500 animate-pulse' : 'bg-gray-900'}`}
                    >
                      <Barcode size={26} className="mr-3"/>
                      {isScanning ? 'Avbryt skanning' : 'Skann merkelapp'}
                    </button>
                    
                    {scanError && <div className="bg-red-100 border-2 border-red-200 p-4 rounded-2xl text-red-700 text-sm font-bold">{scanError}</div>}
                    {isScanning && <div className="overflow-hidden rounded-[1.5rem] shadow-2xl bg-black ring-4 ring-blue-100"><div id="reader"></div></div>}
                    
                    <form onSubmit={handleAddItem} className="bg-white p-5 rounded-[1.5rem] shadow-sm border border-gray-100 space-y-5">
                      <div className="flex bg-gray-100 p-1.5 rounded-2xl gap-1">
                        {['Vanlig', 'Trykkimpregnert'].map(m => (
                          <button 
                            key={m} 
                            type="button" 
                            onClick={() => setMaterialType(m)} 
                            className={`flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all ${materialType === m ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}
                          >
                            {m}
                          </button>
                        ))}
                      </div>

                      <div className="relative">
                        <label className="text-[10px] font-black text-gray-400 uppercase ml-1 mb-1 block tracking-wider">Dimensjon (mm)</label>
                        <select 
                          value={dimension} 
                          onChange={e => setDimension(e.target.value)} 
                          className="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl font-bold appearance-none outline-none transition-all shadow-inner"
                        >
                          {commonDimensions.map(d => <option key={d} value={d}>{d} mm</option>)}
                        </select>
                        <div className="absolute right-4 bottom-4 pointer-events-none opacity-40">▼</div>
                      </div>

                      <div className="flex gap-3">
                        <div className="flex-1 relative">
                          <label className="text-[10px] font-black text-gray-400 uppercase ml-1 mb-1 block tracking-wider">Lengde (m)</label>
                          <input 
                            ref={lengthInputRef}
                            type="text" 
                            inputMode="decimal" 
                            placeholder="F.eks 4.8" 
                            value={length} 
                            onChange={e => setLength(e.target.value)} 
                            className={`w-full p-4 bg-gray-50 border-2 rounded-2xl font-black transition-all outline-none shadow-inner ${autoDetectedLength ? 'border-green-500 bg-green-50' : 'border-transparent focus:border-blue-500'}`} 
                          />
                          {autoDetectedLength && <span className="absolute right-3 bottom-4 text-green-600 text-[10px] font-black bg-white px-2 py-0.5 rounded-lg border border-green-200 shadow-sm">LEST: {autoDetectedLength}m</span>}
                        </div>
                        <div className="w-24">
                          <label className="text-[10px] font-black text-gray-400 uppercase ml-1 mb-1 block tracking-wider">Antall</label>
                          <input 
                            type="number" 
                            value={quantity} 
                            onChange={e => setQuantity(e.target.value)} 
                            className="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl font-black text-center outline-none shadow-inner" 
                          />
                        </div>
                      </div>

                      <button type="submit" className="w-full bg-blue-600 text-white p-5 rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-blue-200 active:scale-95 transition-all flex items-center justify-center">
                        <Plus size={24} className="mr-2"/> Legg til
                      </button>
                    </form>

                    {aiMessage && (
                      <div className="bg-purple-600 p-5 rounded-[1.5rem] text-white text-sm font-medium relative shadow-xl shadow-purple-100">
                        <button onClick={() => setAiMessage('')} className="absolute top-2 right-3 text-purple-200 text-xl font-black">×</button>
                        <div className="flex gap-3 items-start">
                          <Sparkles size={20} className="flex-shrink-0 mt-0.5 text-purple-200"/>
                          <p>{aiMessage}</p>
                        </div>
                      </div>
                    )}

                    <div className="space-y-5 mt-4">
                      {Object.values(groupedItems).map(group => {
                        const isTrykk = group.materialType === 'Trykkimpregnert';
                        return (
                          <div key={`${group.dimension}-${group.materialType}`} className="bg-white rounded-[1.75rem] shadow-sm border border-gray-100 overflow-hidden">
                            <div className={`p-4 font-black flex justify-between items-center ${isTrykk ? 'bg-green-600 text-white' : 'bg-blue-600 text-white'}`}>
                              <div className="flex flex-col">
                                  <span className="text-[9px] uppercase font-black tracking-widest opacity-80 mb-0.5">{group.materialType}</span>
                                  <span className="text-lg">{group.dimension} mm</span>
                              </div>
                              <span className="text-2xl">{group.totalMeters.toFixed(2)}<span className="text-sm opacity-70 ml-1 font-bold tracking-tight">lm</span></span>
                            </div>
                            <div className="p-3 space-y-2 bg-white">
                              {group.items.map(i => (
                                <div key={i.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-2xl border border-gray-100 transition-all hover:bg-gray-100">
                                  <span className="font-bold text-gray-700">{i.quantity} stk <span className="mx-1 text-gray-300">×</span> {i.length} m</span>
                                  <button onClick={() => setItems(items.filter(x => x.id !== i.id))} className="text-red-400 p-2 hover:bg-red-50 rounded-xl transition-all active:scale-90">
                                    <Trash2 size={18}/>
                                  </button>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {activeTab === 'liste' && (
                  <div className="space-y-6 py-2">
                    <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-gray-100">
                      <h2 className="text-2xl font-black text-gray-900 mb-8 border-b-4 border-blue-600 pb-2 inline-block">Materialliste</h2>
                      <div className="space-y-5">
                         {Object.values(groupedItems).length === 0 ? (
                           <p className="text-center text-gray-400 py-12 font-bold italic">Ingen varer registrert ennå...</p>
                         ) : (
                           Object.values(groupedItems).map(g => (
                             <div key={g.dimension + g.materialType} className="flex justify-between items-end border-b-2 border-gray-50 pb-3 last:border-0">
                                <div className="flex flex-col">
                                  <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{g.materialType}</span>
                                  <span className="text-gray-900 font-black text-lg">{g.dimension} mm</span>
                                </div>
                                <span className="font-black text-2xl text-blue-600">{g.totalMeters.toFixed(2)}<span className="text-sm font-bold text-gray-400 ml-1 tracking-tight">lm</span></span>
                             </div>
                           ))
                         )}
                      </div>
                      
                      {items.length > 0 && (
                        <button 
                          onClick={copySummary} 
                          className="w-full mt-10 bg-gray-900 text-white p-5 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center transition-all active:scale-95 shadow-xl"
                        >
                          {copied ? <Check size={22} className="mr-3 text-green-400"/> : <Copy size={22} className="mr-3"/>}
                          {copied ? 'Kopiert!' : 'Kopier Liste'}
                        </button>
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'ai' && (
                  <div className="space-y-5 flex flex-col h-full">
                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-purple-100">
                      <div className="flex items-center gap-3 mb-5">
                        <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shadow-sm"><Sparkles size={28}/></div>
                        <div>
                          <h2 className="text-xl font-black text-gray-800">AI Snekker</h2>
                          <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider leading-tight">Smart planlegging</p>
                        </div>
                      </div>
                      <p className="text-sm text-gray-500 mb-4 leading-relaxed font-medium">Beskriv hva du skal bygge, så foreslår jeg en materialliste med mengder og dimensjoner som legges rett i listen.</p>
                      <textarea 
                        value={aiInput} 
                        onChange={e => setAiInput(e.target.value)} 
                        placeholder="Eks: Jeg skal bygge en platting på 4x5 meter i trykkimpregnert furu..." 
                        className="w-full h-40 p-4 bg-purple-50 border-2 border-transparent focus:border-purple-500 rounded-2xl outline-none transition-all resize-none font-bold text-gray-700 shadow-inner" 
                      />
                      {aiError && <p className="text-red-500 text-[11px] font-bold mt-3 bg-red-50 p-2 rounded-lg">{aiError}</p>}
                      <button 
                        onClick={handleGenerateAI} 
                        disabled={isGenerating || !aiInput.trim()} 
                        className="w-full mt-5 bg-purple-600 text-white p-5 rounded-[1.5rem] font-black uppercase tracking-widest flex items-center justify-center disabled:opacity-50 shadow-xl shadow-purple-100 active:scale-95 transition-all"
                      >
                        {isGenerating ? <Loader2 className="animate-spin mr-3"/> : <Sparkles className="mr-3"/>} 
                        Generer Liste
                      </button>
                    </div>
                    
                    <div className="mt-auto p-5 bg-gray-100 rounded-[1.5rem] border border-gray-200">
                       <label className="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-2">Gemini API-nøkkel (Påkrevd)</label>
                       <input 
                        type="password" 
                        value={customApiKey} 
                        onChange={e => setCustomApiKey(e.target.value)} 
                        className="w-full p-3 bg-white border-2 border-transparent focus:border-purple-500 rounded-xl text-sm font-bold transition-all shadow-sm" 
                        placeholder="Lim inn nøkkel her..." 
                       />
                       <p className="text-[9px] text-gray-400 mt-2 italic font-medium leading-tight">Nøkkelen lagres kun lokalt i din nettleser. Hent gratis nøkkel fra Google AI Studio.</p>
                    </div>
                  </div>
                )}
              </main>

              {showBarcodeModal && (
                <div className="absolute inset-0 z-[60] bg-gray-900/80 backdrop-blur-md flex items-center justify-center p-6 px-4">
                  <div className="bg-white w-full rounded-[2.5rem] p-8 space-y-6 shadow-2xl animate-in fade-in zoom-in duration-300 border border-white/20">
                    <div className="text-center">
                      <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 shadow-inner">
                        <Barcode size={32}/>
                      </div>
                      <h2 className="text-2xl font-black text-gray-900 tracking-tight leading-none">Ny vare!</h2>
                      <p className="text-gray-500 text-sm font-medium mt-2">Hvilket materiale er dette?</p>
                    </div>

                    <div className="bg-blue-50/50 p-4 rounded-2xl text-center font-mono font-black text-blue-600 text-xs border border-blue-100/50 shadow-inner break-all">
                      {scannedCode}
                    </div>
                    
                    <div className="space-y-4">
                        <select 
                          value={dimension} 
                          onChange={e => setDimension(e.target.value)} 
                          className="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl font-black shadow-inner outline-none transition-all appearance-none"
                        >
                          {commonDimensions.map(d => <option key={d} value={d}>{d} mm</option>)}
                        </select>

                        <div className="flex bg-gray-100 p-1 rounded-2xl gap-1">
                          {['Vanlig', 'Trykkimpregnert'].map(m => (
                            <button 
                              key={m} 
                              onClick={() => setMaterialType(m)} 
                              className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${materialType === m ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`}
                            >
                              {m}
                            </button>
                          ))}
                        </div>
                    </div>

                    <div className="pt-4 space-y-3">
                        <button onClick={saveBarcodeLink} className="w-full bg-blue-600 text-white p-5 rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-blue-100 active:scale-95 transition-transform">Lagre og Husk</button>
                        <button onClick={() => { setShowBarcodeModal(false); setScannedCode(null); }} className="w-full text-gray-400 font-black py-2 tracking-widest uppercase text-xs">Avbryt</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Bottom Decoration Bar */}
              <div className="h-6 bg-white w-full flex justify-center items-center pb-1">
                <div className="w-24 h-1.5 bg-gray-200 rounded-full"></div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
