<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trelast Plukkliste</title>
    
    <!-- Tailwind CSS for design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Kjernen i appen) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Gjør at vi kan skrive React-kode direkte i nettleseren) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Skjuler scrollbar i hurtigvalget for lengder */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 sm:bg-gray-200">
    <!-- Her lastes appen inn -->
    <div id="root"></div>

    <!-- Vår React App Kode -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Ikoner (Bakt inn for å slippe avhengigheter) ---
        const Trash2 = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const Plus = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Ruler = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="8" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6" y2="12"></line><line x1="10" y1="8" x2="10" y2="12"></line><line x1="14" y1="8" x2="14" y2="12"></line><line x1="18" y1="8" x2="18" y2="12"></line></svg>
        );
        const Hash = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
        );
        const RefreshCcw = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        );
        const Layers = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        );
        const ListIcon = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        );
        const Copy = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        );
        const Check = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>
        );
        const Sparkles = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const Loader2 = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );

        // --- Hovedapplikasjon ---
        function App() {
          const [items, setItems] = useState(() => {
            const saved = localStorage.getItem('trelast_plukkliste');
            if (saved) {
              return JSON.parse(saved);
            }
            return [];
          });

          const [dimension, setDimension] = useState('48x98');
          const [materialType, setMaterialType] = useState('Vanlig');
          const [length, setLength] = useState('');
          const [quantity, setQuantity] = useState('1'); 
          const [error, setError] = useState('');
          const [activeTab, setActiveTab] = useState('plukk'); 
          const [copied, setCopied] = useState(false); 
          
          // AI States
          const [aiInput, setAiInput] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);
          const [aiMessage, setAiMessage] = useState('');
          const [aiError, setAiError] = useState('');

          const lengthInputRef = useRef(null);

          useEffect(() => {
            localStorage.setItem('trelast_plukkliste', JSON.stringify(items));
          }, [items]);

          const handleAddItem = (e) => {
            e.preventDefault();
            setError('');

            const parsedLength = parseFloat(length.replace(',', '.'));
            const parsedQuantity = parseInt(quantity, 10);

            if (isNaN(parsedLength) || parsedLength <= 0) {
              setError('Vennligst skriv inn en gyldig lengde.');
              return;
            }
            if (isNaN(parsedQuantity) || parsedQuantity <= 0) {
              setError('Vennligst skriv inn et gyldig antall.');
              return;
            }

            const newItem = {
              id: Date.now().toString() + Math.random().toString(),
              dimension: dimension,
              materialType: materialType,
              length: parsedLength,
              quantity: parsedQuantity,
              subtotal: parsedLength * parsedQuantity
            };

            setItems([newItem, ...items]);
            setLength('');
            setQuantity('1'); 
            
            if (lengthInputRef.current) {
              lengthInputRef.current.focus();
            }
          };

          const removeItem = (idToRemove) => {
            setItems(items.filter(item => item.id !== idToRemove));
          };

          const clearList = () => {
            if (window.confirm('Er du sikker på at du vil slette hele listen?')) {
              setItems([]);
              setAiMessage('');
            }
          };

          const handleGenerateAI = async () => {
            if (!aiInput.trim()) return;
            setIsGenerating(true);
            setAiError('');
            
            const apiKey = ""; // API key injiseres av miljøet
            const prompt = `Brukeren planlegger følgende byggeprosjekt: "${aiInput}". Lag en materialliste.`;
            const systemInstruction = `Du er en erfaren og vennlig norsk snekker som hjelper folk med å beregne trelast. 
            Basert på prosjektet brukeren beskriver, skal du anslå en fornuftig materialliste.
            Bruk standard norske trelast-dimensjoner (f.eks. 48x98, 28x120, 48x148, 22x148, 98x98).
            
            Du MÅ returnere svaret som et JSON-objekt med to nøkler:
            1. "message": En kort, oppmuntrende hilsen og kanskje et lite snekkertips tilpasset prosjektet.
            2. "items": En array med materialene. Hvert element må ha:
               - "dimension" (String, f.eks "48x148")
               - "materialType" (String, MÅ være enten "Vanlig" eller "Trykkimpregnert")
               - "length" (Number, lengde i meter, f.eks 4.8 eller 3.6)
               - "quantity" (Integer, antall bord/planker)`;

            const delays = [1000, 2000, 4000, 8000, 16000];
            let attempt = 0;
            let success = false;
            let result = null;

            while (attempt < 5 && !success) {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { 
                      responseMimeType: "application/json",
                      responseSchema: {
                        type: "OBJECT",
                        properties: {
                          message: { type: "STRING" },
                          items: {
                            type: "ARRAY",
                            items: {
                              type: "OBJECT",
                              properties: {
                                dimension: { type: "STRING" },
                                materialType: { type: "STRING" },
                                length: { type: "NUMBER" },
                                quantity: { type: "INTEGER" }
                              }
                            }
                          }
                        }
                      }
                    }
                  })
                });
                if (!response.ok) throw new Error('API Error');
                result = await response.json();
                success = true;
              } catch (err) {
                if (attempt >= 4) {
                  setAiError("Kunne ikke koble til AI-assistenten akkurat nå. Prøv igjen senere.");
                  setIsGenerating(false);
                  return;
                }
                await new Promise(r => setTimeout(r, delays[attempt]));
                attempt++;
              }
            }

            if (success && result) {
              try {
                const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                const parsed = JSON.parse(textResponse);
                
                setAiMessage(parsed.message);
                
                if (parsed.items && parsed.items.length > 0) {
                  const newItems = parsed.items.map(item => ({
                    id: Date.now().toString() + Math.random().toString(),
                    dimension: item.dimension || "Ukjent",
                    materialType: item.materialType === "Trykkimpregnert" ? "Trykkimpregnert" : "Vanlig",
                    length: item.length || 0,
                    quantity: item.quantity || 1,
                    subtotal: (item.length || 0) * (item.quantity || 1)
                  }));
                  
                  // Legg til de nye AI-genererte varene øverst i listen
                  setItems(prev => [...newItems, ...prev]);
                  setAiInput(''); // Tøm input
                  setActiveTab('plukk'); // Bytt tilbake til plukklisten for å vise resultatet
                }
              } catch(e) {
                setAiError("Beklager, jeg forstod ikke svaret fra AI-en.");
              }
            }
            setIsGenerating(false);
          };

          const totalItems = items.reduce((sum, item) => sum + item.quantity, 0);

          const groupedItems = items.reduce((acc, item) => {
            const mType = item.materialType || 'Vanlig';
            const key = `${item.dimension}-${mType}`;
            
            if (!acc[key]) {
              acc[key] = { 
                dimension: item.dimension, 
                materialType: mType, 
                items: [], 
                totalMeters: 0, 
                totalCount: 0 
              };
            }
            acc[key].items.push(item);
            acc[key].totalMeters += item.subtotal;
            acc[key].totalCount += item.quantity;
            return acc;
          }, {});

          const standardLengths = ["3.0", "3.6", "4.2", "4.8", "5.4"];

          const commonDimensions = [
            "11x36", "19x148", "22x148", "23x48", "30x48", "36x48", "36x73",
            "36x98", "36x148", "36x198",
            "48x48", "48x73", "48x98", "48x148", "48x198", "48x223", "98x98"
          ];

          const copySummary = () => {
            let text = "Oppsummering Trelast:\n\n";
            Object.values(groupedItems).forEach((group) => {
              text += `${group.dimension} mm (${group.materialType}): ${group.totalMeters.toFixed(2)} lm (${group.totalCount} stk)\n`;
            });
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setCopied(true);
              setTimeout(() => setCopied(false), 2000); 
            } catch (err) {
              console.error('Kunne ikke kopiere tekst', err);
            }
            document.body.removeChild(textArea);
          };

          return (
            <div className="min-h-screen flex flex-col font-sans">
              <div className="flex-1 w-full max-w-md mx-auto bg-white flex flex-col shadow-2xl relative sm:my-8 sm:h-[850px] sm:flex-none sm:rounded-3xl sm:overflow-hidden">
                
                {/* Header */}
                <header className="bg-blue-600 text-white pt-8 sm:pt-4 shadow-md z-10 flex flex-col">
                  <div className="p-4 flex justify-between items-center">
                    <div>
                      <h1 className="text-xl font-bold tracking-tight">Trelast Plukkliste</h1>
                      <p className="text-blue-100 text-sm">{totalItems} stk varer registrert</p>
                    </div>
                    {items.length > 0 && (
                      <button 
                        onClick={clearList}
                        className="p-2 bg-blue-700 hover:bg-blue-800 rounded-full transition-colors active:scale-95"
                        aria-label="Tøm liste"
                      >
                        <RefreshCcw size={20} />
                      </button>
                    )}
                  </div>
                  
                  {/* Faner */}
                  <div className="flex bg-blue-700">
                    <button 
                      onClick={() => setActiveTab('plukk')}
                      className={`flex-1 py-3 flex justify-center items-center text-xs font-bold uppercase tracking-wide transition-colors ${activeTab === 'plukk' ? 'bg-blue-800 border-b-2 border-white text-white' : 'text-blue-200 hover:text-white'}`}
                    >
                      <ListIcon size={16} className="mr-1.5" /> Plukk
                    </button>
                    <button 
                      onClick={() => setActiveTab('oppsummering')}
                      className={`flex-1 py-3 flex justify-center items-center text-xs font-bold uppercase tracking-wide transition-colors ${activeTab === 'oppsummering' ? 'bg-blue-800 border-b-2 border-white text-white' : 'text-blue-200 hover:text-white'}`}
                    >
                      <FileText size={16} className="mr-1.5" /> Liste
                    </button>
                    <button 
                      onClick={() => setActiveTab('ai')}
                      className={`flex-1 py-3 flex justify-center items-center text-xs font-bold uppercase tracking-wide transition-colors ${activeTab === 'ai' ? 'bg-purple-600 border-b-2 border-white text-white' : 'text-purple-200 bg-blue-800 hover:text-white hover:bg-purple-700'}`}
                    >
                      <Sparkles size={16} className="mr-1.5" /> AI
                    </button>
                  </div>
                </header>

                {/* AI Assistent Fane */}
                {activeTab === 'ai' && (
                  <main className="flex-1 overflow-y-auto bg-purple-50 p-4 pb-6 flex flex-col">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-purple-100 mb-4">
                      <div className="flex items-center space-x-3 mb-3">
                        <div className="bg-purple-100 p-2 rounded-full text-purple-600">
                          <Sparkles size={24} />
                        </div>
                        <h2 className="text-lg font-bold text-gray-800">Virtuell Snekker</h2>
                      </div>
                      <p className="text-gray-600 text-sm mb-4">
                        Beskriv prosjektet ditt, så regner jeg ut en materialliste for deg automatisk!
                      </p>
                      
                      <textarea
                        value={aiInput}
                        onChange={(e) => setAiInput(e.target.value)}
                        placeholder="F.eks: Jeg trenger materialer til å bygge en terrasse på 15 kvadratmeter..."
                        className="w-full h-32 p-3 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none text-gray-700 bg-purple-50/50"
                      />
                      
                      {aiError && <p className="text-red-500 text-sm mt-2">{aiError}</p>}
                      
                      <button
                        onClick={handleGenerateAI}
                        disabled={isGenerating || !aiInput.trim()}
                        className="w-full mt-4 flex items-center justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-md font-bold text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-[0.98]"
                      >
                        {isGenerating ? (
                          <>
                            <Loader2 size={20} className="mr-2 animate-spin" />
                            Tenker...
                          </>
                        ) : (
                          <>
                            <Sparkles size={20} className="mr-2" />
                            ✨ Generer Materialliste
                          </>
                        )}
                      </button>
                    </div>

                    <div className="text-center text-purple-400 text-xs mt-auto">
                      Drevet av Gemini AI
                    </div>
                  </main>
                )}

                {activeTab === 'plukk' && (
                  <React.Fragment>
                    {/* Input Seksjon */}
                    <section className="p-4 bg-white border-b border-gray-100 shadow-sm z-10">
                      <form onSubmit={handleAddItem} className="space-y-4">
                        
                        {/* Valg av Materialtype */}
                        <div className="flex bg-gray-100 p-1 rounded-xl">
                          <button
                            type="button"
                            onClick={() => setMaterialType('Vanlig')}
                            className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${
                              materialType === 'Vanlig' 
                                ? 'bg-white shadow-sm text-gray-900 border border-gray-200' 
                                : 'text-gray-500 hover:text-gray-700'
                            }`}
                          >
                            Vanlig
                          </button>
                          <button
                            type="button"
                            onClick={() => setMaterialType('Trykkimpregnert')}
                            className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${
                              materialType === 'Trykkimpregnert' 
                                ? 'bg-green-100 shadow-sm text-green-800 border border-green-200' 
                                : 'text-gray-500 hover:text-gray-700'
                            }`}
                          >
                            Trykkimpregnert
                          </button>
                        </div>

                        {/* Hurtigvalg for lengder */}
                        <div className="flex space-x-2 overflow-x-auto pb-2 pt-2 scrollbar-hide">
                          {standardLengths.map(sl => (
                            <button
                              key={sl}
                              type="button"
                              onClick={() => setLength(sl)}
                              className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap border transition-colors active:scale-95
                                ${length === sl 
                                  ? 'bg-blue-100 border-blue-500 text-blue-800' 
                                  : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}`}
                            >
                              {sl} m
                            </button>
                          ))}
                        </div>

                        <div>
                          <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">
                            Dimensjon (mm)
                          </label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                              <Layers size={18} className="text-gray-400" />
                            </div>
                            <select
                              value={dimension}
                              onChange={(e) => setDimension(e.target.value)}
                              className="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl leading-5 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-lg transition-shadow appearance-none"
                            >
                              {commonDimensions.map(dim => (
                                <option key={dim} value={dim}>{dim} mm</option>
                              ))}
                            </select>
                            <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                               <span className="text-gray-400 text-xs">▼</span>
                            </div>
                          </div>
                        </div>

                        <div className="flex space-x-3">
                          <div className="flex-1">
                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">
                              Lengde (m)
                            </label>
                            <div className="relative">
                              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <Ruler size={18} className="text-gray-400" />
                              </div>
                              <input
                                ref={lengthInputRef}
                                type="text"
                                inputMode="decimal"
                                value={length}
                                onChange={(e) => setLength(e.target.value)}
                                placeholder="F.eks 4.8"
                                className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-lg transition-shadow"
                              />
                            </div>
                          </div>

                          <div className="w-1/3">
                            <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">
                              Antall
                            </label>
                            <div className="relative">
                              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <Hash size={18} className="text-gray-400" />
                              </div>
                              <input
                                type="number"
                                inputMode="numeric"
                                pattern="[0-9]*"
                                value={quantity}
                                onChange={(e) => setQuantity(e.target.value)}
                                placeholder="Stk"
                                className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-lg transition-shadow"
                              />
                            </div>
                          </div>
                        </div>

                        {error && <p className="text-red-500 text-sm animate-pulse">{error}</p>}

                        <button
                          type="submit"
                          className="w-full flex items-center justify-center py-4 px-4 border border-transparent rounded-xl shadow-sm text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 active:scale-[0.98] transition-all"
                        >
                          <Plus size={24} className="mr-2" />
                          Legg til i liste
                        </button>
                      </form>
                    </section>

                    {/* Liste Seksjon */}
                    <main className="flex-1 overflow-y-auto bg-gray-50 p-4 pb-6">
                      
                      {/* Vise AI-beskjed hvis den finnes */}
                      {aiMessage && (
                        <div className="mb-6 bg-purple-100 border border-purple-200 rounded-xl p-4 flex items-start relative">
                           <Sparkles size={20} className="text-purple-600 mr-3 mt-1 flex-shrink-0" />
                           <p className="text-purple-900 text-sm leading-relaxed pr-6">{aiMessage}</p>
                           <button onClick={() => setAiMessage('')} className="absolute top-2 right-2 text-purple-400 hover:text-purple-700">
                              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                           </button>
                        </div>
                      )}

                      {items.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 pt-10">
                          <Layers size={64} className="opacity-20" />
                          <p className="text-center text-lg px-8">
                            Listen er tom. <br/> Start med å velge dimensjon, lengde og antall ovenfor.
                          </p>
                        </div>
                      ) : (
                        <div className="space-y-6">
                          {Object.entries(groupedItems).map(([dim, group]) => {
                            const isTrykk = group.materialType === 'Trykkimpregnert';
                            return (
                              <div key={dim} className={`bg-white rounded-2xl shadow-sm border overflow-hidden ${isTrykk ? 'border-green-100' : 'border-gray-100'}`}>
                                <div className={`px-4 py-3 border-b flex justify-between items-center ${isTrykk ? 'bg-green-50 border-green-200' : 'bg-orange-50/50 border-orange-100'}`}>
                                  <div>
                                    <h2 className="font-bold text-gray-800 text-lg flex items-center">
                                      <Layers size={18} className={`mr-2 ${isTrykk ? 'text-green-600' : 'text-orange-500'}`} />
                                      {group.dimension} mm
                                    </h2>
                                    <p className={`text-xs font-semibold uppercase ${isTrykk ? 'text-green-600' : 'text-orange-500'}`}>
                                      {group.materialType}
                                    </p>
                                  </div>
                                  <span className={`text-sm font-bold px-3 py-1 rounded-full ${isTrykk ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800'}`}>
                                    {group.totalMeters.toFixed(2)} lm
                                  </span>
                                </div>
                                <ul className="divide-y divide-gray-50 p-2">
                                  {group.items.map((item) => (
                                    <li 
                                      key={item.id} 
                                      className="p-2 flex justify-between items-center transition-all hover:bg-gray-50 rounded-xl"
                                    >
                                      <div className="flex items-center space-x-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-md border ${isTrykk ? 'bg-green-50 text-green-700 border-green-100' : 'bg-blue-50 text-blue-700 border-blue-100'}`}>
                                          {item.quantity}x
                                        </div>
                                        <div>
                                          <div className="font-semibold text-gray-900 text-lg">
                                            {item.length} m
                                          </div>
                                          <div className="text-sm text-gray-500 font-medium">
                                            = {item.subtotal.toFixed(2)} lm
                                          </div>
                                        </div>
                                      </div>
                                      <button
                                        onClick={() => removeItem(item.id)}
                                        className="p-3 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors active:scale-95"
                                        aria-label="Slett vare"
                                      >
                                        <Trash2 size={22} />
                                      </button>
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </main>
                  </React.Fragment>
                )}

                {/* Oppsummering Seksjon */}
                {activeTab === 'oppsummering' && (
                  <main className="flex-1 overflow-y-auto bg-gray-50 p-4 pb-6">
                    {Object.keys(groupedItems).length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 pt-10">
                        <FileText size={64} className="opacity-20" />
                        <p className="text-center text-lg px-8">
                          Ingenting å oppsummere enda.
                        </p>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                          <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Materialliste</h2>
                          <ul className="space-y-3">
                            {Object.entries(groupedItems).map(([dim, group]) => {
                              const isTrykk = group.materialType === 'Trykkimpregnert';
                              return (
                                <li key={dim} className="flex flex-col py-1 border-b border-gray-50 last:border-0">
                                  <div className="flex justify-between items-center">
                                    <span className="font-semibold text-gray-800">{group.dimension} mm</span>
                                    <div className="text-right">
                                      <span className={`font-bold ${isTrykk ? 'text-green-700' : 'text-blue-700'}`}>{group.totalMeters.toFixed(2)} lm</span>
                                      <span className="text-gray-500 text-sm ml-2">({group.totalCount} stk)</span>
                                    </div>
                                  </div>
                                  <span className={`text-xs font-medium uppercase mt-0.5 ${isTrykk ? 'text-green-600' : 'text-orange-500'}`}>{group.materialType}</span>
                                </li>
                              )
                            })}
                          </ul>
                        </div>
                        
                        <button
                          onClick={copySummary}
                          className="w-full flex items-center justify-center py-4 px-4 border border-transparent rounded-xl shadow-sm text-lg font-bold text-white bg-gray-800 hover:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 active:scale-[0.98] transition-all"
                        >
                          {copied ? <Check size={24} className="mr-2 text-green-400" /> : <Copy size={24} className="mr-2" />}
                          {copied ? 'Kopiert!' : 'Kopier til utklippstavle'}
                        </button>
                      </div>
                    )}
                  </main>
                )}

              </div>
            </div>
          );
        }

        // --- Start appen ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
